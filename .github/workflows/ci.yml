name: CI

on:
  pull_request:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: npm

      - run: npm ci
      - run: npm run build
      # Coverage-enforced: vitest.config.ts declares 100% thresholds, so this fails on a regression.
      - run: npm run test:coverage
